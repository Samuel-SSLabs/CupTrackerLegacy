<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Painel Copa 2026</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="debug-log">Conectando...</div>
    <div class="tft-screen">
        <div class="header">
            <span>COPA 2026</span>
            <button id="btn-teste-audio" title="Testar Áudio">
                <img src="assets/favicon.ico" alt="Testar Áudio">
            </button>
        </div>
        <div class="game-list" id="main-queue">
            <div class="sem-jogos">Carregando...</div>
        </div>
        <div class="history-block">
            <div class="history-title">Último Resultado</div>
            <div id="history-content">
                <div style="color: var(--text-muted); text-align: center; font-size: 12px;">Aguardando dados...</div>
            </div>
        </div>
        <div id="modal-detalhes">
            <div class="modal-header">
                <button id="btn-voltar" onclick="fecharModal()" title="Voltar">&#8592;</button>
                <span class="modal-titulo">DETALHES</span>
            </div>
            <div class="modal-body" id="conteudo-estatisticas">
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <span>Carregando...</span>
                </div>
            </div>
        </div>
    </div>
    <div class="powered-by">
        <span>Powered by</span>
        <div class="powered-by-logos">
            <img src="assets/sstudios-logo.png" alt="SStudios Logo">
            <img src="assets/logo-parceiro.png" alt="Logo Parceiro">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
